<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Learning Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Fredoka:wght@500;600;700&family=DynaPuff:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdf6e3;
            --wood-bg: #d4a373;
            --wood-border: #8b5a2b;
            --wood-shadow: #73451e;
            --btn-blue: #6ec1e4;
            --btn-yellow: #ffda59;
            --btn-green: #b3e55e;
            --btn-pink: #ff9eb3;
            --btn-blue-dark: #4da8cf;
            --btn-yellow-dark: #e5b92b;
            --btn-green-dark: #91c83c;
            --btn-pink-dark: #e5738f;
        }

        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Fredoka', sans-serif;
            background: #f5e6c8;
            overflow: hidden;
            color: #333;
        }

        /* Start Screen */
        #startScreen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: url('classroom_bg_1775643668453.jpg') center/cover no-repeat;
        }

        .wood-board {
            background: rgba(212, 163, 115, 0.92);
            border: 6px solid var(--wood-border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 0 var(--wood-shadow), inset 0 0 20px rgba(139, 90, 43, 0.4), 0 20px 60px rgba(0,0,0,0.4);
            max-width: 800px;
            width: 90%;
            backdrop-filter: blur(2px);
        }

        .title {
            font-family: 'Fredoka', sans-serif;
            font-size: 72px;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0 0 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            line-height: 1;
        }

        .title-line {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .title span {
            display: inline-block;
            text-shadow: 
                3px 3px 0 #000,
                -3px -3px 0 #000,
                3px -3px 0 #000,
                -3px 3px 0 #000,
                3px 0 0 #000,
                -3px 0 0 #000,
                0 3px 0 #000,
                0 -3px 0 #000,
                0 8px 15px rgba(0,0,0,0.3);
            transform: rotate(var(--rotate, 0deg));
            animation: bounceLetter 0.6s infinite alternate cubic-bezier(0.455, 0.03, 0.515, 0.955);
        }

        @keyframes bounceLetter {
            from { transform: translateY(0) rotate(var(--rotate, 0deg)); }
            to { transform: translateY(-10px) rotate(var(--rotate, 0deg)); }
        }

        .section-title {
            font-size: 24px;
            color: #4a3424;
            margin: 20px 0 10px;
            font-weight: 600;
            background: rgba(255,255,255,0.4);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 20px;
            border: 2px dashed #8b5a2b;
        }

        .btn-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .round-btn {
            border: none;
            border-radius: 30px;
            padding: 15px 30px;
            font-size: 22px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .round-btn:active {
            transform: translateY(6px);
        }

        .btn-blue { background: var(--btn-blue); box-shadow: 0 8px 0 var(--btn-blue-dark); border: 3px solid white; }
        .btn-blue:active { box-shadow: 0 2px 0 var(--btn-blue-dark); margin-top: 6px; margin-bottom: -6px; }
        
        .btn-yellow { background: var(--btn-yellow); box-shadow: 0 8px 0 var(--btn-yellow-dark); border: 3px solid white; color: #5c3a21; text-shadow: none; }
        .btn-yellow:active { box-shadow: 0 2px 0 var(--btn-yellow-dark); margin-top: 6px; margin-bottom: -6px; }

        .btn-green { background: var(--btn-green); box-shadow: 0 8px 0 var(--btn-green-dark); border: 3px solid white; }
        .btn-green:active { box-shadow: 0 2px 0 var(--btn-green-dark); margin-top: 6px; margin-bottom: -6px; }

        .btn-pink { background: var(--btn-pink); box-shadow: 0 8px 0 var(--btn-pink-dark); border: 3px solid white; }
        .btn-pink:active { box-shadow: 0 2px 0 var(--btn-pink-dark); margin-top: 6px; margin-bottom: -6px; }

        .round-btn.selected {
            transform: scale(1.15);
            box-shadow: 0 0 0 6px white, 0 10px 20px rgba(0,0,0,0.3) !important;
            z-index: 2;
        }



        #startBtn {
            font-size: 28px;
            padding: 15px 40px;
            background: #fff;
            color: var(--wood-shadow);
            border: 4px solid var(--wood-shadow);
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 0 var(--wood-shadow);
            margin-top: 20px;
            transition: all 0.2s;
            font-family: inherit;
        }

        #startBtn:hover {
            background: #f0f0f0;
            transform: translateY(2px);
            box-shadow: 0 4px 0 var(--wood-shadow);
        }

        #startBtn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--wood-shadow);
        }

        /* Game Screen */
        #gameScreen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
        }

        .header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--wood-bg);
            border-bottom: 6px solid var(--wood-border);
            color: white;
            z-index: 10;
        }

        .stat-badge {
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 24px;
            border: 2px solid rgba(255,255,255,0.5);
            font-weight: 700;
        }

        .question-box {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 5px solid var(--btn-blue);
            border-radius: 30px;
            padding: 20px 40px;
            font-size: 32px;
            font-weight: 700;
            color: #333;
            box-shadow: 0 10px 0 var(--btn-blue-dark), 0 15px 30px rgba(0,0,0,0.2);
            z-index: 20;
            text-align: center;
            max-width: 80%;
            animation: slideDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        #cameraContainer {
            flex-grow: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: bold;
            z-index: 50;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            opacity: 0;
        }

        .indicator.right {
            color: #b3e55e;
            animation: popOut 1s forwards;
            text-shadow: 2px 2px 0 #333, -2px -2px 0 #333, 2px -2px 0 #333, -2px 2px 0 #333, 0 4px 10px rgba(0,0,0,0.5);
        }

        .indicator.wrong {
            color: #ff9eb3;
            animation: popOut 1s forwards;
            text-shadow: 2px 2px 0 #333, -2px -2px 0 #333, 2px -2px 0 #333, -2px 2px 0 #333, 0 4px 10px rgba(0,0,0,0.5);
        }

        @keyframes popOut {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="startScreen">
        <div class="wood-board">
            <h1 class="title" id="mainTitle">
                <!-- Spans will be injected here for clean coloring -->
                Kids Learning Adventure
            </h1>
            
            <div class="section-title">1. Choose Topic</div>
            <div class="btn-row">
                <button class="round-btn btn-blue selected" id="topicMath" onclick="selectTopic('math')">🔢 Math</button>
                <button class="round-btn btn-pink" id="topicAnimal" onclick="selectTopic('animals')">🦁 Animal Fun Facts</button>
                <button class="round-btn btn-yellow" id="topicMotherTongue" onclick="selectTopic('motherTongue')">🗣️ Bilingual</button>
            </div>

            <div id="languageSection" style="display: none; width: 100%;">
                <div class="section-title" style="margin-top: 5px;">Select Language</div>
                <div class="btn-row">
                    <button class="round-btn btn-pink selected" id="langChinese" onclick="selectLang('chinese')">Chinese</button>
                    <button class="round-btn btn-green" id="langMalay" onclick="selectLang('malay')">Malay</button>
                    <button class="round-btn btn-yellow" id="langTamil" onclick="selectLang('tamil')">Tamil</button>
                    <button class="round-btn btn-blue" id="langHindi" onclick="selectLang('hindi')">Hindi</button>
                </div>
            </div>

            <div class="section-title">2. Choose Difficulty</div>
            <div class="btn-row">
                <button class="round-btn btn-green selected" id="diffEasy" onclick="selectDiff('easy')">🐢 Easy</button>
                <button class="round-btn btn-yellow" id="diffMedium" onclick="selectDiff('medium')">🐰 Medium</button>
                <button class="round-btn btn-pink" id="diffHard" onclick="selectDiff('hard')">🚀 Hard</button>
            </div>

            <button id="startBtn" onclick="startGame()">▶️ Play Now!</button>
        </div>
    </div>

    <div id="gameScreen">
        <div class="header">
            <div class="stat-badge">⭐ Score: <span id="score">0</span></div>
            <div class="stat-badge">⏱️ <span id="time">60</span>s</div>
        </div>
        <div id="cameraContainer">
            <video id="video" playsinline muted></video>
            <canvas id="overlay"></canvas>
            <div id="questionBox" class="question-box">Loading...</div>
            <div id="indicator" class="indicator"></div>
        </div>
    </div>

    <div id="endScreen" style="display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; flex-direction: column; align-items: center; justify-content: center;">
        <div class="wood-board">
            <h1 class="title" style="font-size: 60px;">Time's Up!</h1>
            <h2 style="color: white; font-size: 40px; margin: 20px 0;">Final Score: <span id="finalScore" style="color: var(--btn-yellow);">0</span></h2>
            <button class="round-btn btn-blue" onclick="location.reload()" style="font-size: 28px; padding: 15px 40px; margin-top: 20px;">Play Again 🔄</button>
        </div>
    </div>

    <script>
        // Color a title with individual pastel colors
        function colorTitle() {
            const titleEl = document.getElementById('mainTitle');
            const lines = ["Kids Learning", "Adventure"];
            const colors = ['#FFB3BA', '#FFDFBA', '#FFFFBA', '#BAFFC9', '#BAE1FF', '#DCD3FF', '#FFFFFF'];
            titleEl.innerHTML = '';
            
            let colorIndex = 0;
            lines.forEach((lineText, lineIdx) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'title-line';
                
                lineText.split('').forEach((char) => {
                    const span = document.createElement('span');
                    span.textContent = char === ' ' ? '\u00A0' : char;
                    if (char !== ' ') {
                        span.style.color = colors[colorIndex % colors.length];
                        span.style.setProperty('--rotate', (Math.random() * 12 - 6) + 'deg');
                        span.style.animationDelay = (colorIndex * 0.08) + 's';
                        colorIndex++;
                    }
                    lineDiv.appendChild(span);
                });
                titleEl.appendChild(lineDiv);
            });
        }

            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }
        window.addEventListener('resize', fitCanvas);

        async function initCamera() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });
            hands.onResults((results) => {
                cursors = [];
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                        const lm = results.multiHandLandmarks[i][8]; // index tip
                        let rawX = 1.0 - lm.x;
                        let rawY = lm.y;
                        
                        // Increase tracking span making reaching the screen edges easier 
                        let boostX = 0.5 + (rawX - 0.5) * 1.4;
                        let boostY = 0.5 + (rawY - 0.5) * 1.2;

                        cursors.push({ x: boostX, y: boostY });
                    }
                }
            });
            const cam = new Camera(video, {
                onFrame: async () => {
                    await hands.send({ image: video });
                },
                width: 640,
                height: 480
            });
            await cam.start();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function startGame() {
            const btn = document.getElementById('startBtn');
            btn.innerText = "Loading Camera...";
            btn.disabled = true;

            try {
                if(!cameraStarted) {
                    await initCamera();
                    cameraStarted = true;
                }
                
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('gameScreen').style.display = 'flex';
                fitCanvas();

                // 50% chance 'catch' or 'chop' game mechanics
                gameMode = Math.random() < 0.5 ? 'catch' : 'chop';
                
                if (currentTopic === 'motherTongue') {
                    currentQuestions = shuffle([...qsData[currentTopic][currentLang][currentDiff]]);
                } else {
                    currentQuestions = shuffle([...qsData[currentTopic][currentDiff]]);
                }
                score = 0;
                timeLeft = 60;
                gameActive = true;
                scoreEl.textContent = score;
                timeEl.textContent = timeLeft;

                const t = setInterval(() => {
                    if(!gameActive) {
                        clearInterval(t);
                        return;
                    }
                    timeLeft--;
                    timeEl.textContent = timeLeft;
                    if(timeLeft <= 0) {
                        endGame();
                    }
                }, 1000);

                nextQuestion();
                gameLoopRAF = requestAnimationFrame(gameLoop);

            } catch(e) {
                console.error(e);
                alert("Camera error: " + e.message);
                btn.innerText = "▶️ Play Now!";
                btn.disabled = false;
            }
        }

        function nextQuestion() {
            if(currentQuestions.length === 0) {
                // reshuffle
                if (currentTopic === 'motherTongue') {
                    currentQuestions = shuffle([...qsData[currentTopic][currentLang][currentDiff]]);
                } else {
                    currentQuestions = shuffle([...qsData[currentTopic][currentDiff]]);
                }
            }
            const q = currentQuestions.pop();
            questionBox.textContent = q.q;
            
            // Animation for question box
            questionBox.style.animation = 'none';
            void questionBox.offsetWidth;
            questionBox.style.animation = 'slideDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

            itemsOnScreen = [];
            
            const options = [
                { text: q.a, isCorrect: true },
                { text: q.w[0], isCorrect: false },
                { text: q.w[1], isCorrect: false },
                { text: q.w[2], isCorrect: false }
            ];
            shuffle(options);

            if(gameMode === 'catch') {
                // Spawn at top
                for(let i=0; i<4; i++) {
                    itemsOnScreen.push({
                        ...options[i],
                        x: 0.125 + (i * 0.25), // Spread out further
                        y: -0.1, // start slightly above screen

                skipFrames = 30; // Prevent instant accidental tapping
            } else {
                // Chop mode: spawn at 4 corners
                chopModeState = 'WAITING_HANDS';
                window.pendingChopOptions = options;
            }
        }

        function showPopup(type, text) {
            indicator.className = `indicator ${type}`;
            indicator.textContent = text;
            indicator.style.animation = 'none';
            void indicator.offsetWidth;
            indicator.style.animation = 'popOut 1s forwards';
        }

        function gameLoop(time) {
            if(!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameMode === 'chop' && chopModeState === 'WAITING_HANDS') {
                ctx.fillStyle = 'rgba(135, 206, 235, 0.4)';
                ctx.beginPath(); ctx.arc(canvas.width * 0.3, canvas.height * 0.6, 90, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(canvas.width * 0.7, canvas.height * 0.6, 90, 0, Math.PI*2); ctx.fill();

                ctx.font = 'bold 40px "Chewy", "Fredoka", sans-serif';
                ctx.fillStyle = 'white';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'black'; ctx.shadowBlur = 4;
                ctx.fillText("Place both hands in the blue circles!", canvas.width / 2, canvas.height * 0.4);
                ctx.shadowBlur = 0;
                
                let leftIn = false;
                let rightIn = false;
                for (let c of cursors) {
                    const cPx = c.x * canvas.width;
                    const cPy = c.y * canvas.height;
                    if (Math.hypot(cPx - canvas.width * 0.3, cPy - canvas.height * 0.6) < 90) leftIn = true;
                    if (Math.hypot(cPx - canvas.width * 0.7, cPy - canvas.height * 0.6) < 90) rightIn = true;
                }
                
                for(let c of cursors) {
                    const cx = c.x * canvas.width;
                    const cy = c.y * canvas.height;
                    ctx.font = '60px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🖐️', cx, cy);
                }

                if (leftIn && rightIn) {
                    chopModeState = 'PLAYING';
                    const corners = [ {x: 0.15, y: 0.25}, {x: 0.85, y: 0.25}, {x: 0.15, y: 0.85}, {x: 0.85, y: 0.85} ];
                    for(let i=0; i<4; i++) {
                        itemsOnScreen.push({
                            ...window.pendingChopOptions[i],
                            x: corners[i].x,
                            y: corners[i].y,
                            size: 90
                        });
                    }
                    skipFrames = 30;
                }
                gameLoopRAF = requestAnimationFrame(gameLoop);
                return;
            }

            // Draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.globalAlpha = p.life;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.baseRad, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
            }

            // Draw items
            for(let i=0; i<itemsOnScreen.length; i++) {
                let item = itemsOnScreen[i];
                
                if(gameMode === 'catch') {
                    if (!item.clicked) {
                        item.y += item.speed;
                    }
                    // Reset if hits bottom
                    if(item.y > 1.2) {
                        item.y = -0.1;
                    }
                } else {
                    // Chop mode: pulse size slightly
                    if (!item.clicked) {
                        item.size = 90 + Math.sin(time / 200 + i) * 8;
                    }
                }

                // Draw background circle for item
                const drawX = item.x * canvas.width;
                const drawY = item.y * canvas.height;
                
                let drawRadius = gameMode === 'catch' ? 75 : item.size;

                ctx.beginPath();
                ctx.arc(drawX, drawY, drawRadius, 0, Math.PI*2);
                ctx.fillStyle = item.clicked ? 'rgba(179, 229, 94, 0.95)' : (gameMode === 'catch' ? 'rgba(255, 255, 255, 0.9)' : 'rgba(255, 218, 89, 0.9)');
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#333';
                ctx.stroke();

                // Draw text/emoji inside
                ctx.font = 'bold 54px "Fredoka", sans-serif';
                ctx.fillStyle = '#333';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.text, drawX, drawY);
            }

            // Draw user cursors (green circle + icon)
            for(let c of cursors) {
                const cx = c.x * canvas.width;
                const cy = c.y * canvas.height;
                
                if (gameMode === 'catch') {
                    // Draw green circle
                    ctx.beginPath();
                    ctx.arc(cx, cy, 60, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(74, 222, 128, 0.4)';
                    ctx.fill();
                    ctx.lineWidth = 6;
                    ctx.strokeStyle = '#4ade80';
                    ctx.stroke();

                    // Draw Icon inside circle
                    ctx.font = '90px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const icon = currentTopic === 'math' ? '🧮' : (currentTopic === 'animals' ? '🐰' : '🌐');
                    ctx.fillText(icon, cx, cy);
                } else {
                    ctx.font = '90px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🖐️', cx, cy);
                }
            }

            if(skipFrames > 0) skipFrames--;

            // Collision detection
            if(skipFrames <= 0) {
                for(let i = itemsOnScreen.length - 1; i >= 0; i--) {
                    let item = itemsOnScreen[i];
                    let hit = false;
                    
                    for(let c of cursors) {
                        const itemPx = item.x * canvas.width;
                        const itemPy = item.y * canvas.height;
                        const cursorPx = c.x * canvas.width;
                        const cursorPy = c.y * canvas.height;
                        const pixelDist = Math.hypot(itemPx - cursorPx, itemPy - cursorPy);
                        const radius = gameMode === 'catch' ? 75 : item.size;
                        
                        if(pixelDist < radius * 0.7) { // requires the finger to be deep inside the circle
                            hit = true;
                            break;
                        }
                    }

                    if(hit && !item.clicked) {
                        if(item.isCorrect) {
                            spawnParticles(item.x * canvas.width, item.y * canvas.height);
                            item.clicked = true;
                            score += (currentDiff === 'hard' ? 3000 : 1000); if(currentDiff === 'hard' && Math.random() < 0.9) score += 6000;
                            scoreEl.textContent = score;
                            showPopup('right', 'Correct! ✨');
                            skipFrames = 20;
                            setTimeout(nextQuestion, 500);
                        } else {
                            score -= 20;
                            scoreEl.textContent = score;
                            showPopup('wrong', 'Oops! 💥');
                            skipFrames = 10; // brief cooldown
                            
                            if(gameMode === 'catch') {
                                // hide temporarily
                                item.y = -0.5;
                            } else {
                                // Chop mode remove from screen
                                itemsOnScreen.splice(i, 1);
                            }
                        }
                    }
                }
            }

            gameLoopRAF = requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameActive = false;
            cancelAnimationFrame(gameLoopRAF);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('endScreen').style.display = 'flex';

            // Send score to parent (KeepFit dashboard)
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({
                    type: 'GAME_COMPLETE',
                    gameId: 'Kids Learning Adventure',
                    score: score
                }, '*');
            }
        }

    </script>
</body>
</html>
